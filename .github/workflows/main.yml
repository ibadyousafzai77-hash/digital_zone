name: Digital Zone WhatsApp Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Start Bot (Keep Alive)
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: |
          echo "Starting Digital Zone Bot..."
          node index.js &
          sleep 21600
